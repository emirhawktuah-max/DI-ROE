{% extends "base.html" %}
{% block title %}Upload CSV — DataFlow{% endblock %}
{% block content %}
<div class="page-title">Upload CSV</div>
<div class="page-subtitle">Max file size: 5 MB. Only .csv files accepted.</div>

<div class="card" style="max-width:560px;">
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label>CSV File</label>
      <input type="file" name="csv_file" accept=".csv" required
        style="padding:8px; cursor:pointer;"/>
    </div>

    {% if current_user.is_admin() %}
    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" name="is_shared" id="is_shared"/>
        <label for="is_shared">Make this dataset shared (visible to all users)</label>
      </div>
    </div>
    {% endif %}

    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-primary">Upload & continue →</button>
      <a href="{{ url_for('main.dashboard') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
